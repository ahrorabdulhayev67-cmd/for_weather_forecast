<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ob-havo prognozi — Gidrometeorologiya xizmati</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">
            <img src="/static/uzhydromet-logo.jpg" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="header-text">
                <h1>Gidrometeorologiya xizmati agentligi</h1>
                <p>Ob-havo prognozi xarita generatori</p>
            </div>
        </div>
        <div class="header-meta" id="currentDate"></div>
    </header>

    <main class="main">
        <!-- MA'LUMOT KIRITISH PANELI -->
        <div class="panel">
            <div class="panel-title">
                <h2>Prognoz ma'lumotlarini kiriting</h2>
                <div class="panel-controls">
                    <input type="date" id="forecastDate" class="date-input">
                    <button class="btn btn-outline" id="btnLoadSample">Namuna</button>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr>
                            <th>Shahar</th>
                            <th>T min °C</th>
                            <th>T max °C</th>
                            <th>Ob-havo</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>

            <!-- GENERATSIYA TUGMASI -->
            <div class="action-bar">
                <button class="btn btn-primary btn-lg" id="btnGenerate">
                    Xaritani yaratish
                </button>
            </div>
        </div>

        <!-- NATIJA PANELI -->
        <div class="panel" id="resultPanel" style="display:none;">
            <div class="panel-title">
                <h2>Ob-havo xaritasi</h2>
                <div class="panel-controls">
                    <button class="btn btn-primary" id="btnDownloadPng">
                        PNG yuklab olish
                    </button>
                    <button class="btn btn-outline" id="btnDownloadSvg">
                        SVG yuklab olish
                    </button>
                </div>
            </div>
            <div class="map-result" id="mapContainer">
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div>
            <strong>Gidrometeorologiya xizmati agentligi</strong>
            <div class="footer-contact">hydromet.uz</div>
        </div>
        <div class="footer-links">
            <span>Ob-havo prognozi xarita generatori v2.0</span>
        </div>
    </footer>

    <script src="/static/regions.js"></script>
    <script src="/static/weather-map.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
