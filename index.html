<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'zgidromet — Interaktiv Ob-havo Xaritasi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="header">
        <div class="header-logo">
            <span class="logo-icon">🌤️</span>
            <h1>O'zgidromet — Interaktiv Ob-havo Xaritasi</h1>
        </div>
        <div class="header-controls">
            <select id="layerSelect">
                <option value="temperature">🌡️ Harorat</option>
                <option value="wind">💨 Shamol</option>
                <option value="precipitation">🌧️ Yog'ingarchilik</option>
                <option value="humidity">💧 Namlik</option>
            </select>
            <button id="refreshBtn" class="btn-refresh">🔄 Yangilash</button>
        </div>
    </header>


    <main class="main-content">
        <div id="map"></div>
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📍 Shahar Prognozi</h2>
                <p class="sidebar-hint">Xaritadagi markerni bosing</p>
            </div>
            <div id="cityDetail" class="city-detail">
                <div class="placeholder">
                    <span class="placeholder-icon">👆</span>
                    <p>Shaharni tanlang</p>
                </div>
            </div>
            <div class="forecast-section">
                <h3>📅 7 kunlik prognoz</h3>
                <div id="weeklyForecast" class="weekly-forecast">
                    <div class="placeholder-small">Shahar tanlanganda ko'rinadi</div>
                </div>
            </div>
        </aside>
    </main>

    <footer class="footer">
        <p>Ma'lumot manbasi: <a href="https://open-meteo.com" target="_blank">Open-Meteo API</a> | 
        Prototip — O'zgidromet interaktiv xarita tizimi</p>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
