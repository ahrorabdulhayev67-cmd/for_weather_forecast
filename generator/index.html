<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'zgidromet — Prognoz Xarita Generatori</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="logo">🌦️</span>
            <div>
                <h1>O'zgidromet — Prognoz Generatori</h1>
                <p class="subtitle">Raqamlarni kiriting → Xarita tayyor</p>
            </div>
        </div>
        <div class="header-right">
            <span class="date-display" id="currentDate"></span>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Step 1: Input Panel -->
        <section class="panel input-panel" id="inputPanel">
            <div class="panel-header">
                <h2>📋 1-qadam: Ma'lumotlarni kiriting</h2>
                <div class="panel-actions">
                    <button class="btn btn-secondary" id="btnLoadSample">📥 Namuna yuklash</button>
                    <button class="btn btn-secondary" id="btnClearAll">🗑️ Tozalash</button>
                </div>
            </div>

            <!-- Day Tabs -->
            <div class="day-tabs">
                <button class="day-tab active" data-day="0">📅 Bugun</button>
                <button class="day-tab" data-day="1">📅 Ertaga</button>
                <button class="day-tab" data-day="2">📅 Indinga</button>
            </div>

            <!-- Input Table -->
            <div class="table-wrapper">
                <table class="forecast-table" id="forecastTable">
                    <thead>
                        <tr>
                            <th class="col-city">Shahar</th>
                            <th class="col-temp">🌡️ Min°C</th>
                            <th class="col-temp">🌡️ Max°C</th>
                            <th class="col-wind">💨 Shamol<br><small>km/s</small></th>
                            <th class="col-precip">🌧️ Yog'in<br><small>mm</small></th>
                            <th class="col-weather">☁️ Ob-havo</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- JS tomonidan to'ldiriladi -->
                    </tbody>
                </table>
            </div>

            <!-- Izoh kiritish -->
            <div class="comment-section">
                <label for="dayComment">📝 Kunlik izoh (xaritada ko'rinadi):</label>
                <textarea id="dayComment" placeholder="Masalan: Farg'ona vodiysida issiqlik 38°C gacha ko'tariladi. Tog'li hududlarda momaqaldiroqli yomg'ir kutilmoqda."></textarea>
            </div>

            <!-- Generate Button -->
            <div class="generate-section">
                <button class="btn btn-primary btn-large" id="btnGenerate">
                    🗺️ Xarita yaratish
                </button>
            </div>
        </section>

        <!-- Step 2: Map Output -->
        <section class="panel map-panel" id="mapPanel" style="display:none;">
            <div class="panel-header">
                <h2>🗺️ 2-qadam: Natija — Interaktiv Xarita</h2>
                <div class="panel-actions">
                    <button class="btn btn-secondary" id="btnBackToInput">← Tahrirlash</button>
                    <button class="btn btn-primary" id="btnExportImage">📸 Rasm sifatida saqlash</button>
                    <button class="btn btn-telegram" id="btnTelegram">📱 Telegram uchun</button>
                </div>
            </div>

            <!-- Map Day Navigation -->
            <div class="map-day-nav">
                <button class="map-day-btn active" data-day="0">Bugun</button>
                <button class="map-day-btn" data-day="1">Ertaga</button>
                <button class="map-day-btn" data-day="2">Indinga</button>
            </div>

            <!-- Map Container -->
            <div class="map-container">
                <div id="map"></div>
                <!-- Izoh banner -->
                <div class="map-comment" id="mapComment"></div>
            </div>

            <!-- Telegram Preview -->
            <div class="telegram-preview" id="telegramPreview" style="display:none;">
                <h3>📱 Telegram xabar ko'rinishi:</h3>
                <div class="tg-message" id="tgMessage"></div>
                <button class="btn btn-secondary" id="btnCopyTg">📋 Nusxa olish</button>
            </div>
        </section>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
